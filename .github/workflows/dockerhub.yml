name: Docker Hub

on:
  push:
    paths:
      - ".dockerignore"
      - ".github/workflows/dockerhub.yml"
      - "Dockerfile"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "sdk/**"
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/dockerhub.yml"
      - "Dockerfile"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "sdk/**"
  workflow_dispatch:

jobs:
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for pull requests
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: gale:pr-${{ github.event.pull_request.number }}

      - name: Validate Docker Hub configuration
        if: github.event_name != 'pull_request'
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
        run: |
          username="$(printf '%s' "$DOCKERHUB_USERNAME" | tr -d '[:space:]')"
          repository="$(printf '%s' "${DOCKERHUB_REPOSITORY:-gale}" | tr -d '[:space:]')"

          test -n "$username" || { echo "Missing DOCKERHUB_USERNAME secret"; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo "Missing DOCKERHUB_TOKEN secret"; exit 1; }
          test -n "$repository" || { echo "Missing DOCKERHUB_REPOSITORY variable"; exit 1; }

          echo "username=$username" >> "$GITHUB_OUTPUT"
          echo "image=$username/$repository" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.dockerhub.outputs.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
